<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="color-scheme" content="light" />
    <meta
      name="description"
      content="Chendi Zhou - research profile on LLM systems, diffusion language models, code generation, agent workflows, and AI evaluation."
    />
    <title>Chendi Zhou - Research Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="#top" aria-label="Back to top">
          <span class="brand-mark" data-brand-mark></span>
          <span class="brand-copy">
            <span class="brand-name" data-brand-name></span>
            <span class="brand-role" data-brand-role></span>
          </span>
        </a>

        <nav class="site-nav" aria-label="Primary navigation">
          <div class="nav-list" data-nav-list></div>
        </nav>

        <div class="header-actions">
          <div
            class="lang-switch"
            role="group"
            aria-label="Language switcher"
          >
            <button type="button" data-lang-choice="en">EN</button>
            <button type="button" data-lang-choice="zh">中文</button>
          </div>
        </div>
      </div>
    </header>

    <main id="top">
      <section class="hero section" id="hero">
        <div class="container hero-grid">
          <div class="hero-copy reveal" data-hero-copy></div>
          <aside class="hero-panel reveal" data-hero-panel></aside>
        </div>
      </section>

      <section class="section" id="profile">
        <div class="container reveal" data-profile-section></div>
      </section>

      <section class="section" id="research">
        <div class="container reveal" data-research-section></div>
      </section>

      <section class="section" id="projects">
        <div class="container reveal" data-projects-section></div>
      </section>

      <section class="section" id="experience">
        <div class="container reveal" data-experience-section></div>
      </section>

      <section class="section" id="skills">
        <div class="container reveal" data-skills-section></div>
      </section>

      <section class="section" id="thinking">
        <div class="container reveal" data-thinking-section></div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container reveal" data-footer-section></div>
    </footer>

    <button class="back-to-top" type="button" data-back-to-top>
      <span aria-hidden="true" data-back-to-top-label>Top</span>
    </button>

    <noscript>
      <div class="noscript-banner">
        JavaScript is required to render the bilingual content on this page.
      </div>
    </noscript>

    <script src="script.js"></script>
  </body>
</html>
